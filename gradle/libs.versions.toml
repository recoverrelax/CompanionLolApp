dagger-hilt-android = { module = "com.google.dagger:hilt-android", version.ref = "dagger-hilt-android" }
dagger-hilt-compiler = { module = "com.google.dagger:hilt-compiler", version.ref = "dagger-hilt-android" }

io-coil = { module = "io.coil-kt.coil3:coil-compose", version.ref = "io-coil" }
io-coil-okhttp = { module = "io.coil-kt.coil3:coil-network-okhttp", version.ref = "io-coil" }
