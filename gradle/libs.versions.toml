io-sqldelight-android = { module = "app.cash.sqldelight:android-driver", version.ref = "io-sqldelight" }
io-sqldelight-adapters = { module = "app.cash.sqldelight:primitive-adapters", version.ref = "io-sqldelight" }
io-sqldelight-coroutines = { module = "app.cash.sqldelight:coroutines-extensions", version.ref = "io-sqldelight" }
io-timber = { module = "com.jakewharton.timber:timber", version.ref = "io-timber" }

kotlinx-datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "kotlinx-datetime" }
kotlinx-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-serialization-json" }
kotlinx-coroutines = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "kotlinx-coroutines" }

#TESTING
junit = { group = "junit", name = "junit", version.ref = "junit" }

io-sqldelight-sqlite = { module = "app.cash.sqldelight:sqlite-driver", version.ref = "io-sqldelight" }

kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinx-coroutines" }
androidx-espresso-core = { group = "androidx.test.espresso", name = "espresso-core", version.ref = "androidx-espresso-core" }
androidx-junit = { group = "androidx.test.ext", name = "junit", version.ref = "androidx-junit" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }

kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
kotlinx-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }

dagger-hilt-android = { id = "com.google.dagger.hilt.android", version.ref = "dagger-hilt-android" }
io-sqldelight = { id = "app.cash.sqldelight", version.ref = "io-sqldelight" }

detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt" }
spotless = { id = "com.diffplug.spotless", version.ref = "spotless" }
stability-analyzer = { id = "com.github.skydoves.compose.stability.analyzer", version.ref = "stability-analyzer" }
